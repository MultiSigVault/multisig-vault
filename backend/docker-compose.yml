version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: multisig-vault-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multisig_vault
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multisig-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multisig-vault-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - multisig-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: multisig-vault-backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: multisig_vault
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    networks:
      - multisig-network
    command: yarn start:dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: multisig-vault-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@multisigvault.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - multisig-network
    profiles:
      - tools

networks:
  multisig-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: